name: 'OpenTofu Cleanup'

on:
  workflow_dispatch:  # Manual trigger button

env:
  AWS_REGION: eu-north-1

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: arn:aws:iam::936777225880:role/GitHubActionsTerraformApply
          aws-region: ${{ env.AWS_REGION }}

      - name: OpenTofu - Setup Tofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb  # v2.0.0
        with:
          tofu_version: '1.11.2'

      - name: Execute OpenTofu init in envs/test
        working-directory: envs/test
        run: |
          tofu init

      - name: Execute OpenTofu Destroy in envs/test
        working-directory: envs/test
        run: |
          tofu destroy -auto-approve
