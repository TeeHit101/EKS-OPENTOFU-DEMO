name: 'OpenTofu CI/CD'

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  test-connection:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: arn:aws:iam::936777225880:role/GitHubActionsTerraformPlan
          aws-region: ${{ env.AWS_REGION }}

  deploy:
    runs-on: ubuntu-latest
    needs: test-connection  # Ensures the deploy job only runs if test-connection succeeds
    environment: test
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: arn:aws:iam::936777225880:role/GitHubActionsTerraformApply
          aws-region: ${{ env.AWS_REGION }}

      - name: OpenTofu - Setup Tofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4  # v2.0.1
        with:
          tofu_version: '1.11.2'

      - name: Execute OpenTofu init in envs/test
        working-directory: envs/test
        run: |
          tofu init

      - name: Execute OpenTofu Plan in envs/test
        working-directory: envs/test
        run: |
          tofu plan

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: 'v3.16.3'

      - name: Execute OpenTofu Apply in envs/test
        working-directory: envs/test
        run: |
          tofu apply -auto-approve
