name: 'OpenTofu CI/CD'

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  test-connection:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Git clone the repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: arn:aws:iam::936777225880:role/GitHubActionsTerraformPlan
          aws-region: ${{ env.AWS_REGION }}

  deploy:
    runs-on: ubuntu-latest
    needs: test-connection  # Ensures the deploy job only runs if test-connection succeeds
    environment: test
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: arn:aws:iam::936777225880:role/GitHubActionsTerraformApply
          aws-region: ${{ env.AWS_REGION }}

      - name: OpenTofu - Setup Tofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4  # v2.0.2
        with:
          tofu_version: '1.11.2'

      - name: Execute OpenTofu init in envs/test
        working-directory: envs/test
        run: |
          tofu init

      - name: Execute OpenTofu Plan in envs/test
        working-directory: envs/test
        run: |
          tofu plan

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: 'v3.16.3'

      - name: Execute OpenTofu Apply in envs/test
        working-directory: envs/test
        run: |
          tofu apply -auto-approve
